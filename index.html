<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Macro Logger</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
body{margin:0;background:#f5f6f8;color:#111827;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:16px}
.app{max-width:520px;margin:auto}
h1{font-size:34px;margin:10px 0 4px}.sub{color:#6b7280;margin-bottom:14px}
.card{background:white;border-radius:22px;padding:18px;margin:14px 0;box-shadow:0 8px 24px rgba(0,0,0,.08)}
h2{margin:0 0 14px;font-size:24px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.total{background:#f3f4f6;border-radius:16px;padding:10px 6px;text-align:center}
.total b{display:block;font-size:17px}.total span{font-size:11px;color:#6b7280}
input,textarea{width:100%;box-sizing:border-box;border:1px solid #d1d5db;border-radius:14px;padding:13px;font-size:16px;margin:6px 0}
textarea{min-height:90px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
button{width:100%;border:0;border-radius:15px;padding:14px;font-size:16px;font-weight:800;margin-top:10px;background:#2563eb;color:white}
.good{background:#16a34a}.light{background:#eef2ff;color:#1d4ed8}.danger{background:#fee2e2;color:#b91c1c}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{width:auto;background:#eff6ff;color:#1d4ed8;border:1px solid #dbeafe;border-radius:999px;padding:8px 11px;margin:0}
.food{display:grid;grid-template-columns:1fr auto;gap:8px;border-bottom:1px solid #e5e7eb;padding:12px 0}
.meta{font-size:13px;color:#6b7280}.x{width:auto;background:#f3f4f6;color:#6b7280;padding:8px 10px;margin:0}
.preview{width:100%;max-height:240px;object-fit:contain;border-radius:14px;margin-top:10px;background:#f3f4f6;display:none}
.small{font-size:13px;color:#6b7280}
</style>
</head>
<body>
<div class="app">
<h1>Macro Logger</h1>
<div class="sub">Scan labels, add common foods, track daily macros.</div>

<div class="card">
<h2>Today</h2>
<input id="date" type="date">
<div class="grid4">
<div class="total"><b id="tCal">0</b><span>Cal</span></div>
<div class="total"><b id="tC">0g</b><span>Carbs</span></div>
<div class="total"><b id="tP">0g</b><span>Protein</span></div>
<div class="total"><b id="tF">0g</b><span>Fat</span></div>
</div>
</div>

<div class="card">
<h2>Add Food</h2>
<input id="food" placeholder="Food name">
<div class="row">
<input id="servings" type="number" step="0.1" value="1" placeholder="Servings">
<input id="note" placeholder="Serving note">
</div>
<div class="row">
<input id="cal" type="number" placeholder="Calories">
<input id="carbs" type="number" step="0.1" placeholder="Carbs g">
<input id="protein" type="number" step="0.1" placeholder="Protein g">
<input id="fat" type="number" step="0.1" placeholder="Fat g">
</div>
<button class="good" onclick="addFood()">Add Food</button>
</div>

<div class="card">
<h2>Common Foods</h2>
<input id="search" placeholder="Search banana, rice, chicken..." oninput="showFoods()">
<div id="foods" class="chips"></div>
</div>

<div class="card">
<h2>Scan Nutrition Label</h2>
<p class="small">Use a clear close-up photo. Check values before adding.</p>
<input id="photo" type="file" accept="image/*" capture="environment">
<img id="preview" class="preview">
<button onclick="scanLabel()">Scan Label</button>
<p id="status" class="small"></p>
<textarea id="ocrText" placeholder="Detected text appears here."></textarea>
<button class="light" onclick="parseText()">Parse Text</button>
</div>

<div class="card">
<h2>Food Log</h2>
<div id="log"></div>
<button class="light" onclick="exportCSV()">Export CSV</button>
<button class="danger" onclick="clearDay()">Clear Today</button>
</div>
</div>

<script>
const $=id=>document.getElementById(id);
$('date').value=new Date().toISOString().slice(0,10);

const common=[
{name:"Banana, large",note:"1 large",cal:130,c:33,p:1.6,f:0.5},
{name:"Belvita biscuits",note:"1 pack",cal:230,c:36,p:3,f:8},
{name:"Chicken breast",note:"100 g cooked",cal:165,c:0,p:31,f:3.6},
{name:"Chicken 65",note:"100 g estimate",cal:220,c:8,p:18,f:12},
{name:"Egg",note:"1 large",cal:72,c:0.4,p:6.3,f:5},
{name:"Egg whites",note:"100 g",cal:52,c:0.7,p:11,f:0.2},
{name:"White rice",note:"1 cup cooked",cal:205,c:45,p:4.3,f:0.4},
{name:"Basmati rice",note:"1 cup cooked",cal:190,c:39,p:4,f:0.5},
{name:"Oats",note:"40 g dry",cal:150,c:27,p:5,f:3},
{name:"Greek yogurt",note:"170 g nonfat",cal:100,c:6,p:17,f:0},
{name:"Whey protein",note:"1 scoop",cal:120,c:3,p:24,f:1.5},
{name:"Chapati",note:"1 medium",cal:120,c:18,p:3,f:3},
{name:"Dal",note:"1 cup estimate",cal:230,c:35,p:18,f:1},
{name:"Paneer",note:"100 g estimate",cal:265,c:3,p:18,f:20},
{name:"Chicken biryani",note:"1 cup estimate",cal:380,c:45,p:18,f:14}
];

const key=()=>`macro_${$('date').value}`;
const getLog=()=>JSON.parse(localStorage.getItem(key())||"[]");
const saveLog=x=>{localStorage.setItem(key(),JSON.stringify(x));render();};
const num=id=>parseFloat($(id).value)||0;
const round=x=>Math.round(x*10)/10;

$('date').addEventListener('change',render);

$('photo').addEventListener('change',e=>{
const file=e.target.files[0];
if(!file)return;
$('preview').src=URL.createObjectURL(file);
$('preview').style.display='block';
});

function setForm(x){
$('food').value=x.name;
$('note').value=x.note||"";
$('servings').value=1;
$('cal').value=x.cal||0;
$('carbs').value=x.c||0;
$('protein').value=x.p||0;
$('fat').value=x.f||0;
}

function showFoods(){
const q=$('search').value.toLowerCase();
const list=common.filter(x=>x.name.toLowerCase().includes(q)).slice(0,12);
$('foods').innerHTML=list.map(x=>`<button class="chip" onclick="setForm(common[${common.indexOf(x)}])">${x.name}</button>`).join("");
}
showFoods();

function addFood(){
const name=$('food').value.trim();
if(!name){alert("Enter food name");return;}
const s=num('servings')||1;
const item={
name:name+($('note').value?` (${$('note').value})`:""),
cal:Math.round(num('cal')*s),
c:round(num('carbs')*s),
p:round(num('protein')*s),
f:round(num('fat')*s)
};
const log=getLog();
log.push(item);
saveLog(log);
['food','note','cal','carbs','protein','fat'].forEach(id=>$(id).value="");
$('servings').value=1;
}

function delFood(i){
const log=getLog();
log.splice(i,1);
saveLog(log);
}

function render(){
const log=getLog();
const t=log.reduce((a,x)=>({cal:a.cal+x.cal,c:a.c+x.c,p:a.p+x.p,f:a.f+x.f}),{cal:0,c:0,p:0,f:0});
$('tCal').textContent=Math.round(t.cal);
$('tC').textContent=round(t.c)+"g";
$('tP').textContent=round(t.p)+"g";
$('tF').textContent=round(t.f)+"g";
$('log').innerHTML=log.length?log.map((x,i)=>`
<div class="food">
<div><b>${x.name}</b><div class="meta">${x.cal} cal • C ${x.c}g • P ${x.p}g • F ${x.f}g</div></div>
<button class="x" onclick="delFood(${i})">✕</button>
</div>`).join(""):`<p class="small">No food added yet.</p>`;
}

function match(text,patterns){
for(const p of patterns){
const m=text.match(p);
if(m)return parseFloat(m[1]);
}
return 0;
}

function parseText(){
const raw=$('ocrText').value;
const t=raw.replace(/\n/g," ").replace(/\s+/g," ").toLowerCase();
const cal=match(t,[/calories\s*(\d{1,4})/,/energy\s*(\d{1,4})\s*k?cal/]);
const c=match(t,[/total carbohydrate\s*(\d{1,3}(?:\.\d+)?)\s*g/,/carbohydrate\s*(\d{1,3}(?:\.\d+)?)\s*g/,/carbs?\s*(\d{1,3}(?:\.\d+)?)\s*g/]);
const p=match(t,[/protein\s*(\d{1,3}(?:\.\d+)?)\s*g/]);
const f=match(t,[/total fat\s*(\d{1,3}(?:\.\d+)?)\s*g/,/\bfat\s*(\d{1,3}(?:\.\d+)?)\s*g/]);
setForm({name:"Scanned food",note:"1 serving",cal,c,p,f});
}

async function scanLabel(){
const file=$('photo').files[0];
if(!file){alert("Choose/take a photo first");return;}
$('status').textContent="Scanning... this may take 10-20 seconds.";
try{
const result=await Tesseract.recognize(file,'eng');
$('ocrText').value=result.data.text;
$('status').textContent="Scan done. Check values before adding.";
parseText();
}catch(e){
$('status').textContent="Scan failed. Try a clearer photo or paste text manually.";
}
}

function exportCSV(){
const log=getLog();
let csv="Food,Calories,Carbs,Protein,Fat\n";
log.forEach(x=>csv+=`"${x.name.replaceAll('"','""')}",${x.cal},${x.c},${x.p},${x.f}\n`);
const a=document.createElement("a");
a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
a.download=`macro_${$('date').value}.csv`;
a.click();
}

function clearDay(){
if(confirm("Clear today's log?"))saveLog([]);
}

render();
</script>
</body>
</html>
