<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>MACRO LOGGER</title>

<link rel="apple-touch-icon" href="icon.PNG">
<link rel="icon" type="image/png" href="icon.PNG">

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
*{box-sizing:border-box}
html,body{overflow-x:hidden}

body{
  margin:0;
  padding:18px;
  background:
  radial-gradient(circle at top,#243b67 0%,#111827 45%,#020617 100%);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
}

.app{max-width:560px;margin:auto}

.hero{
  text-align:center;
  font-size:42px;
  font-weight:1000;
  letter-spacing:2px;
  color:white;
  padding:26px 10px;
  border-radius:30px;
  margin:18px 0 6px;
  background:linear-gradient(135deg,#2563eb,#7c3aed,#ec4899);
  box-shadow:
  0 22px 45px rgba(124,58,237,.45),
  inset 0 1px 0 rgba(255,255,255,.25);
  text-shadow:0 3px 10px rgba(0,0,0,.25);
  font-family:Impact,Haettenschweiler,'Arial Black',sans-serif;
}

.creator{
  text-align:center;
  color:#dbeafe;
  font-size:18px;
  font-style:italic;
  font-family:cursive;
  margin-bottom:18px;
}

.card{
  background:linear-gradient(145deg,rgba(255,255,255,.98),rgba(240,247,255,.96));
  border-radius:30px;
  padding:22px;
  margin:18px 0;
  border:1px solid rgba(255,255,255,.9);
  box-shadow:
  0 22px 45px rgba(0,0,0,.22),
  inset 0 1px 0 rgba(255,255,255,.8);
}

.card-blue{background:linear-gradient(135deg,#eef7ff,#ffffff)}
.card-red{background:linear-gradient(135deg,#ffedd5,#fecaca,#ffffff)}
.card-green{background:linear-gradient(135deg,#ecfdf5,#ffffff)}
.card-purple{background:linear-gradient(135deg,#f5f3ff,#ffffff)}

.card h2{
  margin:0 0 16px;
  font-size:28px;
  color:#0f172a;
}

label{
  display:block;
  font-size:14px;
  font-weight:800;
  color:#1e293b;
  margin:8px 0 6px;
}

input,textarea{
  width:100%;
  border:1.5px solid #cbd5e1;
  border-radius:18px;
  padding:15px;
  font-size:17px;
  background:white;
  color:#0f172a;
  outline:none;
}

input:focus,textarea:focus{
  border-color:#60a5fa;
  box-shadow:0 0 0 4px rgba(96,165,250,.15);
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

button{
  width:100%;
  border:0;
  border-radius:18px;
  padding:15px;
  font-size:17px;
  font-weight:900;
  color:white;
  margin-top:12px;
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  box-shadow:0 10px 24px rgba(37,99,235,.28);
}

.good{background:linear-gradient(135deg,#22c55e,#15803d)}
.purple{background:linear-gradient(135deg,#8b5cf6,#6d28d9)}
.light{background:#eef2ff;color:#1d4ed8}
.danger{background:#fee2e2;color:#b91c1c}

.date-display{
  width:100%;
  height:58px;
  border-radius:18px;
  border:1.5px solid #cbd5e1;
  background:white;
  font-size:18px;
  font-weight:700;
  color:#0f172a;
  text-align:center;
}

.hidden-date{
  position:absolute;
  opacity:0;
  width:1px;
  height:1px;
}

.progress-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:18px;
  justify-items:center;
  margin-top:18px;
}

.ring{
  --p:0%;
  --ring:#22c55e;
  width:104px;
  height:104px;
  border-radius:50%;
  background:conic-gradient(var(--ring) var(--p),#e5e7eb 0);
  padding:10px;
  box-shadow:0 0 22px rgba(59,130,246,.10);
}

.ring-inner{
  width:100%;
  height:100%;
  border-radius:50%;
  background:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.ring-inner b{
  font-size:18px;
  color:#0f172a;
}

.ring-inner span{
  font-size:12px;
  color:#64748b;
}

.remaining{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:18px;
}

.rem-box{
  background:white;
  border:1px solid #e2e8f0;
  border-radius:18px;
  padding:14px;
  text-align:center;
}

.rem-box b{
  display:block;
  font-size:22px;
  color:#0f172a;
}

.rem-box span{
  font-size:13px;
  color:#64748b;
}

.note{color:#64748b;font-size:14px}
.status{display:none;color:#16a34a;font-weight:800;margin-top:10px}

.saved-food,.log-item{
  display:grid;
  grid-template-columns:1fr auto;
  gap:10px;
  align-items:center;
  padding:13px 0;
  border-bottom:1px solid #edf2f7;
}

.small-btn{
  width:auto;
  padding:9px 12px;
  margin:0;
  border-radius:13px;
  font-size:14px;
}

.preview{
  width:100%;
  max-height:250px;
  object-fit:contain;
  border-radius:18px;
  margin:12px 0;
  background:#f8fafc;
  display:none;
}

@media(max-width:430px){
.hero{font-size:30px}
}
</style>
</head>

<body>
<div class="app">

<div class="hero">MACRO 🍽️ LOGGER</div>
<div class="creator">Created by Shashank Singh Deo</div>

<div class="card card-blue">
<h2>Today</h2>

<button id="dateDisplay" class="date-display" onclick="openDatePicker()">Apr 29, 2026</button>
<input id="date" class="hidden-date" type="date">

<div class="progress-grid">
<div class="ring" id="ringCal"><div class="ring-inner"><b id="tCal">0</b><span>Cal</span></div></div>
<div class="ring" id="ringC"><div class="ring-inner"><b id="tC">0g</b><span>Carbs</span></div></div>
<div class="ring" id="ringP"><div class="ring-inner"><b id="tP">0g</b><span>Protein</span></div></div>
<div class="ring" id="ringF"><div class="ring-inner"><b id="tF">0g</b><span>Fat</span></div></div>
</div>

<div class="remaining">
<div class="rem-box"><b id="leftCal">0</b><span>Calories left</span></div>
<div class="rem-box"><b id="score">0%</b><span>Daily progress</span></div>
</div>
</div>

<div class="card card-red">
<h2>🎯 Daily Macro Targets</h2>

<div class="row">
<input id="goalCal" type="number" placeholder="Calories">
<input id="goalC" type="number" placeholder="Carbs (g)">
<input id="goalP" type="number" placeholder="Protein (g)">
<input id="goalF" type="number" placeholder="Fat (g)">
</div>

<button class="purple" onclick="saveTargets()">Save Targets</button>
<div id="targetStatus" class="status">Saved ✓</div>
</div>

<div class="card card-green">
<h2>➕ Add Food</h2>

<input id="food" placeholder="Food name">

<div class="row">
<input id="servings" type="number" step="0.1" value="1" placeholder="Servings">
<input id="note" placeholder="1 pack / 100g">
</div>

<div class="row">
<input id="cal" type="number" placeholder="Calories">
<input id="carbs" type="number" placeholder="Carbs (g)">
<input id="protein" type="number" placeholder="Protein (g)">
<input id="fat" type="number" placeholder="Fat (g)">
</div>

<button class="good" onclick="addFood()">Add Food</button>
</div>

<div class="card card-purple">
<h2>⭐ My Saved Foods</h2>

<input id="savedName" placeholder="Food name">

<div class="row">
<input id="savedCal" type="number" placeholder="Calories">
<input id="savedC" type="number" placeholder="Carbs">
<input id="savedP" type="number" placeholder="Protein">
<input id="savedF" type="number" placeholder="Fat">
</div>

<button class="purple" onclick="saveCustomFood()">Save Item</button>
<div id="savedFoods"></div>
</div>

<div class="card card-blue">
<h2>📒 Food Log</h2>
<div id="log"></div>
<button class="light" onclick="exportCSV()">Export CSV</button>
<button class="danger" onclick="clearDay()">Clear Today</button>
</div>

</div>

<script>
const $=id=>document.getElementById(id)
const num=id=>parseFloat($(id).value)||0
const round=x=>Math.round(x*10)/10

$('date').value=new Date().toISOString().slice(0,10)

function pretty(v){
const d=new Date(v+"T00:00:00")
return d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})
}

function updateDate(){ $('dateDisplay').textContent=pretty($('date').value) }
updateDate()

function openDatePicker(){
if($('date').showPicker){$('date').showPicker()}else{$('date').click()}
}

$('date').addEventListener('change',()=>{updateDate();loadTargets();render()})

const logKey=()=> "log_"+$('date').value
const targetKey=()=> "target_"+$('date').value
const savedKey="saved_foods"

const getLog=()=>JSON.parse(localStorage.getItem(logKey())||"[]")
const getSaved=()=>JSON.parse(localStorage.getItem(savedKey)||"[]")

function saveLog(x){localStorage.setItem(logKey(),JSON.stringify(x));render()}
function saveSaved(x){localStorage.setItem(savedKey,JSON.stringify(x));renderSaved()}

function getTargets(){
return{
cal:num('goalCal')||2250,
c:num('goalC')||120,
p:num('goalP')||190,
f:num('goalF')||55
}
}

function saveTargets(){
localStorage.setItem(targetKey(),JSON.stringify(getTargets()))
$('targetStatus').style.display="block"
setTimeout(()=>{$('targetStatus').style.display="none"},1500)
render()
}

function loadTargets(){
const t=JSON.parse(localStorage.getItem(targetKey())||"{}")
$('goalCal').value=t.cal||2250
$('goalC').value=t.c||120
$('goalP').value=t.p||190
$('goalF').value=t.f||55
}

function ringColor(p){
if(p<=85)return"#22c55e"
if(p<=100)return"#f59e0b"
return"#ef4444"
}

function setRing(id,val,target){
let p=target?(val/target)*100:0
let c=Math.min(p,100)
let col=ringColor(p)
$(id).style.setProperty("--p",c+"%")
$(id).style.setProperty("--ring",col)
}

function totals(){
return getLog().reduce((a,x)=>({
cal:a.cal+x.cal,
c:a.c+x.c,
p:a.p+x.p,
f:a.f+x.f
}),{cal:0,c:0,p:0,f:0})
}

function render(){
const log=getLog()
const t=totals()
const g=getTargets()

$('tCal').textContent=Math.round(t.cal)
$('tC').textContent=round(t.c)+"g"
$('tP').textContent=round(t.p)+"g"
$('tF').textContent=round(t.f)+"g"

setRing("ringCal",t.cal,g.cal)
setRing("ringC",t.c,g.c)
setRing("ringP",t.p,g.p)
setRing("ringF",t.f,g.f)

$('leftCal').textContent=Math.round(g.cal-t.cal)

const score=((t.cal/g.cal)+(t.c/g.c)+(t.p/g.p)+(t.f/g.f))/4*100
$('score').textContent=Math.round(score)+"%"

$('log').innerHTML=log.map((x,i)=>`
<div class="log-item">
<div>
<b>➤ ${x.name}</b>
<div class="note">${x.cal} cal • C ${x.c}g • P ${x.p}g • F ${x.f}g</div>
</div>
<button class="small-btn danger" onclick="removeFood(${i})">X</button>
</div>`).join("")
}

function addFood(){
const name=$('food').value.trim()
if(!name)return

const s=num('servings')||1
const log=getLog()

log.push({
name:name,
cal:Math.round(num('cal')*s),
c:round(num('carbs')*s),
p:round(num('protein')*s),
f:round(num('fat')*s)
})

saveLog(log)

;['food','cal','carbs','protein','fat','note'].forEach(i=>$(i).value="")
$('servings').value=1
}

function removeFood(i){
const log=getLog()
log.splice(i,1)
saveLog(log)
}

function saveCustomFood(){
const arr=getSaved()
arr.push({
name:$('savedName').value,
cal:num('savedCal'),
c:num('savedC'),
p:num('savedP'),
f:num('savedF')
})
saveSaved(arr)
}

function useSaved(i){
const x=getSaved()[i]
$('food').value=x.name
$('cal').value=x.cal
$('carbs').value=x.c
$('protein').value=x.p
$('fat').value=x.f
}

function renderSaved(){
const arr=getSaved()
$('savedFoods').innerHTML=arr.map((x,i)=>`
<div class="saved-food">
<div onclick="useSaved(${i})">
<b>📌 ${x.name}</b>
<div class="note">${x.cal} cal • C ${x.c} • P ${x.p} • F ${x.f}</div>
</div>
</div>`).join("")
}

function exportCSV(){
const log=getLog()
const t=totals()
const g=getTargets()

let csv="Food,Calories,Carbs,Protein,Fat\n"
log.forEach(x=>{
csv+=`${x.name},${x.cal},${x.c},${x.p},${x.f}\n`
})
csv+=`\nTOTAL,${t.cal},${t.c},${t.p},${t.f}\n`
csv+=`TARGET,${g.cal},${g.c},${g.p},${g.f}\n`

const a=document.createElement("a")
a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}))
a.download="macro_log.csv"
a.click()
}

function clearDay(){
localStorage.removeItem(logKey())
render()
}

loadTargets()
render()
renderSaved()
</script>
</body>
</html>
